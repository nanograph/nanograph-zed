name = "nanograph schema"
grammar = "nanograph_schema"
path_suffixes = ["pg"]
line_comments = ["// "]
block_comment = ["/*", "*/"]
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = false },
  { start = "[", end = "]", close = true, newline = false },
  { start = "\"", end = "\"", close = true, newline = false },
]
tab_size = 2
